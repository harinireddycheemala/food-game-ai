<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCrave Arcade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- 1. MAIN MENU (Orange Theme) -->
    <div id="main-menu" class="screen">
        <h1 class="orange-title">🍊 SmartCrave Arcade</h1>
        <p class="subtitle">Select an Option</p>
        
        <div class="menu-buttons">
            <button onclick="showGameSelector()" class="btn-large orange-btn">🎮 Play Games</button>
            <button onclick="toggleSound()" class="btn-large">🔊 Sound: <span id="sound-status">OFF</span></button>
            <button onclick="alert('Settings Saved!')" class="btn-large">⚙️ Settings</button>
        </div>
    </div>

    <!-- 2. GAME SELECTOR -->
    <div id="game-selector" class="screen" style="display: none;">
        <h2>Choose Your Game</h2>
        <div class="game-cards">
            <!-- Game 1: Memory Match -->
            <div class="game-card" onclick="launchMemoryGame()">
                <div class="card-icon">🧠</div>
                <h3>Memory Match</h3>
                <p>Find matching food pairs.</p>
            </div>
            
            <!-- Game 2: Recipe Generator -->
            <div class="game-card" onclick="launchRecipeGame()">
                <div class="card-icon">👨‍🍳</div>
                <h3>Recipe AI</h3>
                <p>What's in your fridge?</p>
            </div>
        </div>
        <button onclick="goBack('main-menu')" class="btn-back">← Back</button>
    </div>

    <!-- 3. MEMORY GAME (Existing) -->
    <div id="memory-game" class="screen" style="display: none;">
        <div class="game-header">
            <h2>🧠 Cuisine Match</h2>
            <button onclick="goBack('game-selector')" class="btn-small">Exit</button>
        </div>
        
        <div class="game-controls">
            <div class="stat-box">Moves: <span id="move-count">0</span></div>
            <div class="stat-box">Time: <span id="timer">00:00</span></div>
        </div>

        <div class="game-board" id="game-board"></div>
        
        <div class="game-actions">
            <button onclick="startMemoryGame()" class="btn-primary">Start</button>
            <button onclick="aiHint()" class="btn-secondary">AI Hint</button>
        </div>
        <div id="message" class="message"></div>
    </div>

    <!-- 4. RECIPE GAME (New) -->
    <div id="recipe-game" class="screen" style="display: none;">
        <div class="game-header">
            <h2>👨‍🍳 AI Recipe Gen</h2>
            <button onclick="goBack('game-selector')" class="btn-small">Exit</button>
        </div>

        <div class="fridge-container">
            <h3>What's in your fridge?</h3>
            <p>Select 3 ingredients:</p>
            
            <div class="ingredients-grid" id="ingredients-grid">
                <!-- Checkboxes generated by JS -->
            </div>

            <button onclick="generateRecipe()" class="btn-large orange-btn">✨ Generate Recipe</button>
        </div>

        <div id="recipe-result" style="display: none; text-align: center;">
            <h3 id="recipe-name"></h3>
            <p id="recipe-desc" style="font-style: italic;"></p>
            <button onclick="resetRecipeGame()" class="btn-small">Try Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
