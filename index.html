<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuisine Match - AI Logic Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍽️ Cuisine Match</h1>
            <p>AI-Driven Logic & Pattern Recognition Demo</p>
        </header>

        <!-- NEW: Start Screen (Configuration) -->
        <div id="start-screen">
            <h2>Game Setup</h2>
            <p>How many pairs would you like to play with?</p>
            <select id="pair-selector">
                <option value="3">3 Pairs (Easy)</option>
                <option value="4" selected>4 Pairs (Medium)</option>
                <option value="6">6 Pairs (Hard)</option>
                <option value="8">8 Pairs (Expert)</option>
            </select>
            <br><br>
            <button onclick="startGame()" class="btn-primary">Start Game</button>
        </div>

        <!-- Game Board (Hidden initially) -->
        <div id="game-container" style="display: none;">
            <div class="stats">
                <div class="stat-box">
                    <span>Moves:</span>
                    <span id="move-count">0</span>
                </div>
                <div class="stat-box">
                    <span>Time:</span>
                    <span id="timer">00:00</span>
                </div>
            </div>

            <div class="game-board" id="game-board">
                <!-- Cards injected here -->
            </div>

            <div class="controls">
                <button onclick="resetGame()" class="btn-secondary">Change Difficulty</button>
                <button onclick="aiHint()" class="btn-secondary">💡 AI Hint</button>
            </div>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
